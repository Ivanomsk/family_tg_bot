services:
  # Telegram бот + веб-интерфейс
  bot:
    build: .
    container_name: durdom-bot
    restart: unless-stopped
    volumes:
      # Монтируем данные для сохранения между перезапусками
      - ./bot_data:/app/bot_data
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "5051:5050"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5050/login')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - durdom-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  durdom-network:
    driver: bridge

volumes:
  bot_data:
    driver: local
