{% extends "base.html" %}

{% block title %}Логи{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>📝 Логи</h2>
    <div>
        <form method="POST" action="{{ url_for('clear_logs') }}" style="display: inline;">
            <input type="hidden" name="log_type" value="bot">
            <button type="submit" class="btn btn-sm btn-warning" 
                    onclick="return confirm('Очистить bot.log?');">
                <i class="bi bi-eraser"></i> Очистить bot.log
            </button>
        </form>
        <form method="POST" action="{{ url_for('clear_logs') }}" style="display: inline; margin-left: 10px;">
            <input type="hidden" name="log_type" value="audit">
            <button type="submit" class="btn btn-sm btn-warning" 
                    onclick="return confirm('Очистить audit.log?');">
                <i class="bi bi-eraser"></i> Очистить audit.log
            </button>
        </form>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">📝 bot.log ({{ bot_logs|length }} строк)</h5>
            </div>
            <div class="card-body">
                <div class="log-container">
                    {% for line in bot_logs %}
                    <div class="mb-1">{{ line }}</div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">🔒 audit.log ({{ audit_logs|length }} строк)</h5>
            </div>
            <div class="card-body">
                <div class="log-container">
                    {% for line in audit_logs %}
                    <div class="mb-1">{{ line }}</div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
